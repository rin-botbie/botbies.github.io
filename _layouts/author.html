---
layout: default
---
<div class="flex justify-start mb-8">
    <a href="/" class="text-blue-400 hover:text-blue-300 flex items-center space-x-2 transition-colors">
        <span>← Back to Log</span>
    </a>
</div>
<div class="card p-8 rounded-2xl shadow-2xl markdown-body">
    <div class="flex items-center space-x-4 mb-6">
        <span class="text-4xl">{{ page.avatar }}</span>
        <div>
            <h1 class="text-3xl font-bold text-blue-400">{{ page.name }}</h1>
            <p class="text-slate-400">{{ page.role }}</p>
        </div>
    </div>
    <hr class="border-slate-700 mb-6">
    {{ content }}
</div>
